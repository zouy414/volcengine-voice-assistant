name: CI

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: 1.25

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
      - name: Lint
        run: |
          pylint $(git ls-files '*.py')
