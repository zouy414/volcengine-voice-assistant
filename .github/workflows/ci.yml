name: CI

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pylint isort
      - name: Lint
        run: |
          python -m pylint $(git ls-files '*.py')
          python3 -m isort $(git ls-files '*.py')
          python3 -m autopep8 --diff --aggressive $(git ls-files '*.py')
