name: CI

on:
  push:
    branches:
      - master
      - create-pull-request/*
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: HACS
        uses: hacs/action@22.5.0
        with:
          category: integration
      - name: HASS
        uses: home-assistant/actions/hassfest@master
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pylint isort autopep8
      - name: Lint
        run: |
          python -m pylint $(git ls-files '*.py')
          python3 -m isort $(git ls-files '*.py')
          python3 -m autopep8 --diff --aggressive $(git ls-files '*.py')
