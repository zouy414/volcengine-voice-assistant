name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  COMPONENT_NAME: volcengine_voice_assistant
  PACKAGE_NAME: volcengine_voice_assistant.zip

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Update version
        run: jq ".|.version=\"${{ github.ref_name }}\"" "${{ github.workspace }}/custom_components/${{ env.COMPONENT_NAME }}/manifest.json"
      - name: Compress
        run: |
          cd "${{ github.workspace }}/custom_components/${{ env.COMPONENT_NAME }}"
          zip "${{ env.PACKAGE_NAME }}" -r ./
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ github.workspace }}/custom_components/${{ env.COMPONENT_NAME }}/${{ env.PACKAGE_NAME }}"
