name: Configuration Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate-voice-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-autopep8
      - name: Update Configuration
        run: |
          sed -i '/# VALID_VOICES_CONFIG_START/,/# VALID_VOICES_CONFIG_END/d' ./custom_components/volcengine_voice_assistant/config/__init__.py
          echo "# VALID_VOICES_CONFIG_START" >> ./custom_components/volcengine_voice_assistant/config/__init__.py
          ./hack/generate-voice-list >> ./custom_components/volcengine_voice_assistant/config/__init__.py
          echo "# VALID_VOICES_CONFIG_END" >> ./custom_components/volcengine_voice_assistant/config/__init__.py
      - name: Format Code
        run: |
          autopep8 --in-place --recursive ./custom_components/volcengine_voice_assistant/config/__init__.py
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          title: "chore: Automated Configuration Update"
          commit-message: "chore: auto-update configuration"
          delete-branch: true
          labels: automated
